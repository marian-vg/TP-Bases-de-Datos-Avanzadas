services:
  backend:
    build: ./backend
    container_name: pulse_city_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: host.docker.internal
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    container_name: pulse_city_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
